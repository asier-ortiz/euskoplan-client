<!-- Botón -->
<button [disabled]="!_favourites || _formBeingSubmitted"
        pButton
        pRipple
        type="button"
        [icon]="_resourceIsAlreadyInFavourites() ? 'pi pi-heart-fill' : 'pi pi-heart'"
        class="p-button-rounded p-button-text z-3 ml-auto sm:ml-0"
        [pTooltip]="_resourceIsAlreadyInFavourites() ? 'Eliminar de mis favoritos' : 'Añadir a mis favoritos' "
        (click)="_onAddRemoveToFavouritesFormSubmit()">
</button>
